---
name: Deployment Candidate Subscribe
on:
  workflow_call:
    inputs:
      tag:
        description: Tag
        required: true
        type: string
      versions:
        description: Deployment versions in properties file format
        required: true
        type: string
      envs:
        description: Array of deployment environments
        required: false
        default: "['']"
        type: string
      working-directory:
        description: Working directory
        required: false
        default: "."
        type: string
      tfvars-filename:
        description: Filename of tfvars files
        required: false
        default: "terraform.tfvars"
        type: string
      tfvars-update-names:
        description: Newline separated list of pipe separated variable, value regex and version property name
        required: true
        type: string
      branch-update-base:
        description: Base name of temporary branch to use for creating update
        required: false
        default: "chore/publish-update"
        type: string
permissions:
  contents: write
  issues: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    if: (github.triggering_actor != 'dependabot[bot]')
    strategy:
      matrix:
        env: ${{ fromJSON(inputs.envs) }}
    steps:
      - uses: aps831/gh-actions/deployment-candidate-sub@feat/latest-deployment
        with:
          tag: ${{ inputs.tag }}
          versions: ${{ inputs.versions }}
          env: ${{ matrix.env }}
          working-directory: ${{ inputs.working-directory }}
          tfvars-filename: ${{ inputs.tfvars-filename }}
          tfvars-update-names: ${{ inputs.tfvars-update-names }}
          branch-update-base: ${{ inputs.branch-update-base }}
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
